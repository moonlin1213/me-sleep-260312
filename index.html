
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Sleep - Spirit Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400&display=swap');
        
        body {
            background-color: #030408;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Slow ethereal appearance and disappearance */
        .spirit-fade {
            transition: opacity 3s ease-in-out, filter 3s ease-in-out, transform 3s ease-in-out, letter-spacing 3s ease-in-out;
        }

        .blur-out {
            opacity: 0 !important;
            filter: blur(15px) !important;
            letter-spacing: 0.6em !important;
            transform: scale(1.05);
        }

        .golden-glow-text {
            text-shadow: 
                0 0 12px rgba(212, 175, 55, 0.4), 
                0 0 25px rgba(212, 175, 55, 0.2),
                0 0 40px rgba(212, 175, 55, 0.05);
        }

        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes main-btn-glow {
            0% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); border-color: rgba(212, 175, 55, 0.6); transform: scale(1.01); }
            100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.2); }
        }
        .btn-main-glow {
            animation: main-btn-glow 6s infinite ease-in-out;
        }

        .mask-gradient {
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        .mask-gradient-x {
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        @keyframes ripple-effect {
            0% { transform: scale(0); opacity: 0.4; filter: blur(2px); }
            100% { transform: scale(4); opacity: 0; filter: blur(15px); }
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.3);
            pointer-events: none;
            animation: ripple-effect 2s linear forwards;
        }
    </style>
<script type="importmap">

    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
